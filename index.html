<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タロット占い</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a14;
    --card-bg: #1a1528;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #6e5a2a;
    --purple: #6b3fa0;
    --purple-light: #9b6fc8;
    --text: #e8dfc8;
    --text-dim: #9e8e72;
    --border: rgba(201,168,76,0.25);
    --shadow: rgba(0,0,0,0.7);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(107,63,160,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(30,15,60,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 40%);
    pointer-events:none; z-index:0;
  }
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star {
    position:absolute; background:white; border-radius:50%;
    animation:twinkle var(--dur,3s) ease-in-out infinite;
    animation-delay:var(--delay,0s); opacity:0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0;transform:scale(1);}
    50%{opacity:var(--brightness,.7);transform:scale(1.2);}
  }
  .container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:40px 20px 80px; }

  header { text-align:center; margin-bottom:50px; }
  .header-ornament { color:var(--gold); font-size:1.2rem; letter-spacing:.5em; margin-bottom:8px; opacity:.6; }
  h1 {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(1.8rem,5vw,3rem);
    color:var(--gold-light);
    text-shadow:0 0 30px rgba(201,168,76,.3), 0 2px 4px rgba(0,0,0,.8);
    letter-spacing:.05em; line-height:1.2; margin-bottom:10px;
  }
  .subtitle { font-style:italic; color:var(--text-dim); font-size:1.1rem; letter-spacing:.1em; }

  .panel {
    background:linear-gradient(135deg,rgba(26,21,40,.9),rgba(19,15,30,.95));
    border:1px solid var(--border);
    border-radius:12px; padding:28px 32px; margin-bottom:20px;
    box-shadow:0 4px 24px var(--shadow), inset 0 1px 0 rgba(201,168,76,.1);
  }
  .panel-title {
    font-family:'Cinzel Decorative',serif;
    font-size:.75rem; color:var(--gold);
    letter-spacing:.3em; text-transform:uppercase; margin-bottom:18px; opacity:.8;
  }

  /* 選択ボタン共通 */
  .option-grid { display:flex; gap:10px; flex-wrap:wrap; }
  .opt-btn {
    flex:1; min-width:80px;
    padding:12px 8px;
    background:transparent;
    border:1px solid var(--gold-dim);
    border-radius:8px;
    color:var(--text-dim);
    font-family:'Cormorant Garamond',serif;
    font-size:.95rem;
    cursor:pointer;
    transition:all .25s;
    text-align:center;
    line-height:1.4;
  }
  .opt-btn:hover { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,.08); }
  .opt-btn.active { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,.12); box-shadow:0 0 14px rgba(201,168,76,.2); }
  .opt-btn .num { display:block; font-size:1.5rem; font-weight:700; }
  .opt-btn .desc { display:block; font-size:.72rem; font-style:italic; opacity:.7; margin-top:2px; }

  /* テーマ選択 */
  .theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .theme-btn {
    padding:14px 10px;
    background:transparent;
    border:1px solid var(--gold-dim);
    border-radius:8px;
    color:var(--text-dim);
    font-family:'Cormorant Garamond',serif;
    font-size:1rem; cursor:pointer;
    transition:all .25s; text-align:center;
  }
  .theme-btn:hover { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,.08); }
  .theme-btn.active { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,.12); box-shadow:0 0 14px rgba(201,168,76,.2); }
  .theme-btn .theme-icon { display:block; font-size:1.4rem; margin-bottom:4px; }
  .theme-btn .theme-label { display:block; font-size:.9rem; }

  /* トグル行 */
  .toggle-row { display:flex; align-items:center; gap:16px; }
  .toggle-label { font-size:1.05rem; color:var(--text-dim); flex:1; }
  .toggle { position:relative; width:54px; height:28px; flex-shrink:0; }
  .toggle input { display:none; }
  .toggle-track {
    position:absolute; inset:0;
    background:rgba(201,168,76,.15);
    border:1px solid var(--gold-dim);
    border-radius:14px; cursor:pointer; transition:all .3s;
  }
  .toggle input:checked ~ .toggle-track { background:rgba(201,168,76,.3); border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.2); }
  .toggle-thumb {
    position:absolute; top:3px; left:3px;
    width:20px; height:20px;
    background:var(--gold-dim); border-radius:50%;
    transition:all .3s; pointer-events:none;
  }
  .toggle input:checked ~ .toggle-track .toggle-thumb { left:29px; background:var(--gold-light); box-shadow:0 0 8px rgba(201,168,76,.5); }

  .toggles-row { display:flex; gap:20px; flex-wrap:wrap; }
  .toggles-row .toggle-row { flex:1; min-width:200px; }

  /* ドローボタン */
  .draw-btn {
    width:100%; padding:18px;
    background:linear-gradient(135deg,rgba(107,63,160,.4),rgba(50,25,90,.6));
    border:1px solid var(--purple-light);
    border-radius:10px; color:var(--text);
    font-family:'Cinzel Decorative',serif; font-size:1rem;
    letter-spacing:.15em; cursor:pointer; transition:all .3s;
    position:relative; overflow:hidden;
    box-shadow:0 4px 20px rgba(107,63,160,.2);
    margin-bottom:24px;
  }
  .draw-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,.15),transparent); opacity:0; transition:opacity .3s; }
  .draw-btn:hover { border-color:var(--gold); color:var(--gold-light); box-shadow:0 4px 30px rgba(201,168,76,.2),0 0 60px rgba(107,63,160,.3); transform:translateY(-1px); }
  .draw-btn:hover::before { opacity:1; }
  .draw-btn:active { transform:translateY(0); }
  .draw-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* ローディング */
  .loading { text-align:center; padding:40px; display:none; }
  .loading-orb { width:48px; height:48px; border:2px solid var(--gold-dim); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg);} }

  /* カードエリア */
  #cards-area { display:none; }
  .cards-grid { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; margin-bottom:24px; }
  .card-wrapper { opacity:0; transform:translateY(30px); transition:all .6s ease; text-align:center; cursor:pointer; }
  .card-wrapper.visible { opacity:1; transform:translateY(0); }
  .card-wrapper.selected .card-frame { border-color:var(--gold); box-shadow:0 0 30px rgba(201,168,76,.4),0 8px 32px var(--shadow); }
  .card-frame {
    width:130px; height:228px;
    border:2px solid var(--gold-dim); border-radius:8px;
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    background:var(--card-bg); margin:0 auto 10px;
    transition:all .3s; position:relative;
    box-shadow:0 4px 20px var(--shadow);
  }
  .card-frame:hover { border-color:var(--gold); box-shadow:0 0 20px rgba(201,168,76,.25),0 8px 24px var(--shadow); }
  .card-frame img { width:100%; height:100%; object-fit:cover; display:block; }
  .card-frame.reversed img { transform:rotate(180deg); }
  .card-badge {
    position:absolute; top:6px; right:6px;
    background:rgba(13,10,20,.85); border:1px solid var(--gold-dim);
    border-radius:4px; padding:2px 6px;
    font-size:.6rem; color:var(--gold); letter-spacing:.05em;
    font-family:'Cinzel Decorative',serif;
  }
  .card-name { font-size:.85rem; color:var(--gold-light); font-style:italic; letter-spacing:.05em; margin-bottom:3px; }
  .card-pos-label { font-size:.7rem; color:var(--text-dim); letter-spacing:.1em; }

  /* 個別解説エリア */
  #reading-area { display:none; }
  .reading-panel {
    background:linear-gradient(135deg,rgba(26,21,40,.95),rgba(19,15,30,.98));
    border:1px solid var(--border); border-radius:12px; padding:32px;
    box-shadow:0 4px 24px var(--shadow); animation:fadeIn .6s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  .reading-card-title { font-family:'Cinzel Decorative',serif; font-size:1.2rem; color:var(--gold-light); text-align:center; margin-bottom:6px; }
  .reading-position { text-align:center; font-style:italic; color:var(--text-dim); font-size:.9rem; margin-bottom:20px; }
  .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
  .reading-section-title { font-family:'Cinzel Decorative',serif; font-size:.65rem; color:var(--gold); letter-spacing:.3em; opacity:.7; margin-bottom:10px; }
  .reading-text { font-size:1.05rem; line-height:1.9; color:var(--text); font-weight:300; }
  .reading-keyword { display:inline-block; padding:3px 10px; border:1px solid var(--gold-dim); border-radius:20px; font-size:.8rem; color:var(--gold); margin:3px; }

  /* AI総合解説エリア */
  #ai-reading-area { display:none; margin-top:24px; }
  .ai-panel {
    background:linear-gradient(135deg,rgba(30,15,55,.95),rgba(20,10,40,.98));
    border:1px solid rgba(155,111,200,.4); border-radius:12px; padding:32px;
    box-shadow:0 4px 30px rgba(107,63,160,.25), inset 0 1px 0 rgba(155,111,200,.15);
  }
  .ai-panel-header {
    display:flex; align-items:center; gap:12px; margin-bottom:24px;
    padding-bottom:16px; border-bottom:1px solid rgba(155,111,200,.2);
  }
  .ai-icon { font-size:1.6rem; }
  .ai-title-block {}
  .ai-title { font-family:'Cinzel Decorative',serif; font-size:1rem; color:var(--purple-light); letter-spacing:.1em; }
  .ai-subtitle { font-size:.85rem; color:var(--text-dim); font-style:italic; margin-top:2px; }
  .ai-text { font-size:1.08rem; line-height:2; color:var(--text); font-weight:300; white-space:pre-wrap; }
  .ai-loading { text-align:center; padding:30px 0; }
  .ai-loading-dots { display:inline-flex; gap:8px; }
  .ai-loading-dots span {
    width:8px; height:8px; background:var(--purple-light); border-radius:50%;
    animation:dot-pulse 1.4s ease-in-out infinite;
  }
  .ai-loading-dots span:nth-child(2){animation-delay:.2s;}
  .ai-loading-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot-pulse { 0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);} }
  .ai-loading p { color:var(--text-dim); font-style:italic; margin-top:12px; font-size:.95rem; }

  /* ヒント・リセット */
  .nav-hint { text-align:center; margin-top:0; margin-bottom:16px; font-size:.85rem; color:var(--text-dim); font-style:italic; }
  .reset-btn {
    display:none; margin:16px auto 0;
    padding:12px 32px; background:transparent;
    border:1px solid var(--gold-dim); border-radius:6px;
    color:var(--text-dim); font-family:'Cormorant Garamond',serif;
    font-size:.95rem; cursor:pointer; letter-spacing:.1em;
    transition:all .25s; font-style:italic;
  }
  .reset-btn:hover { border-color:var(--gold); color:var(--gold-light); }

  @media(max-width:600px){
    .panel{padding:20px 16px;}
    .theme-grid{grid-template-columns:repeat(2,1fr);}
    .card-frame{width:100px;height:175px;}
    .cards-grid{gap:10px;}
    .reading-panel,.ai-panel{padding:22px 16px;}
    .toggles-row{flex-direction:column;gap:12px;}
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <header>
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1>Tarot Oracle</h1>
    <p class="subtitle">ライダー・ウェイト版タロット占い</p>
  </header>

  <!-- 枚数 -->
  <div class="panel">
    <div class="panel-title">✦ 引く枚数</div>
    <div class="option-grid">
      <button class="opt-btn active" data-count="1"><span class="num">1</span><span class="desc">一枚引き</span></button>
      <button class="opt-btn" data-count="3"><span class="num">3</span><span class="desc">過去・現在・未来</span></button>
      <button class="opt-btn" data-count="5"><span class="num">5</span><span class="desc">ファイブカード</span></button>
      <button class="opt-btn" data-count="10"><span class="num">10</span><span class="desc">ケルト十字</span></button>
    </div>
  </div>

  <!-- テーマ -->
  <div class="panel">
    <div class="panel-title">✦ 何について占いますか？</div>
    <div class="theme-grid">
      <button class="theme-btn active" data-theme="general"><span class="theme-icon">🌙</span><span class="theme-label">直近の運勢</span></button>
      <button class="theme-btn" data-theme="money"><span class="theme-icon">💰</span><span class="theme-label">金運</span></button>
      <button class="theme-btn" data-theme="overall"><span class="theme-icon">⭐</span><span class="theme-label">総合運</span></button>
      <button class="theme-btn" data-theme="work"><span class="theme-icon">💼</span><span class="theme-label">仕事運</span></button>
      <button class="theme-btn" data-theme="relation"><span class="theme-icon">🤝</span><span class="theme-label">対人関係</span></button>
      <button class="theme-btn" data-theme="free"><span class="theme-icon">✨</span><span class="theme-label">心に浮かべて</span></button>
    </div>
  </div>

  <!-- オプション -->
  <div class="panel">
    <div class="toggles-row">
      <div class="toggle-row">
        <span class="toggle-label">逆位置を含める</span>
        <label class="toggle">
          <input type="checkbox" id="reversed-toggle">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">小アルカナも含める</span>
        <label class="toggle">
          <input type="checkbox" id="minor-toggle">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </label>
      </div>
    </div>
  </div>

  <button class="draw-btn" id="draw-btn">✦ &nbsp; カードを引く &nbsp; ✦</button>

  <div class="loading" id="loading">
    <div class="loading-orb"></div>
    <p style="color:var(--text-dim);font-style:italic;">カードを読み解いています…</p>
  </div>

  <!-- カード表示 -->
  <div id="cards-area">
    <div class="cards-grid" id="cards-grid"></div>
    <p class="nav-hint">カードをクリックして個別解説を見る</p>

    <!-- AI総合解説 -->
    <div id="ai-reading-area">
      <div class="ai-panel">
        <div class="ai-panel-header">
          <div class="ai-icon">🔮</div>
          <div class="ai-title-block">
            <div class="ai-title" id="ai-title">総合リーディング</div>
            <div class="ai-subtitle" id="ai-subtitle">カード全体が伝えるメッセージ</div>
          </div>
        </div>
        <div id="ai-content">
          <div class="ai-loading">
            <div class="ai-loading-dots"><span></span><span></span><span></span></div>
            <p>星の声を読み解いています…</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 個別解説 -->
    <div id="reading-area">
      <div class="reading-panel" id="reading-panel"></div>
    </div>

    <button class="reset-btn" id="reset-btn">もう一度占う</button>
  </div>
</div>

<script>
// ========== タロットデータ ==========
const TAROT_DATA = {
  "major_0":{ name:"愚者", en:"The Fool", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/RWS_Tarot_00_Fool.jpg/180px-RWS_Tarot_00_Fool.jpg", keywords:["新しい始まり","自由","冒険","無邪気","可能性"], upright:"新しい出発の時が近づいています。既成概念を手放し、未知の世界へと一歩を踏み出す勇気が求められています。計算よりも直感を信じ、軽やかに前へ進むことで、思いがけない豊かな体験があなたを待っています。", reversed:"無謀さや準備不足への警告です。衝動的な行動は思わぬトラブルを招きかねません。一度立ち止まり、冷静に現状を見つめ直すことで、真に必要な変化が見えてくるでしょう。" },
  "major_1":{ name:"魔術師", en:"The Magician", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/RWS_Tarot_01_Magician.jpg/180px-RWS_Tarot_01_Magician.jpg", keywords:["意志力","創造","技術","自己実現","行動力"], upright:"あなたには目標を実現するためのすべての力が備わっています。知識、技術、意志力——それらを組み合わせることで、望む未来を自らの手で創り出すことができます。今こそ、その力を信じて行動に移す時です。", reversed:"才能や力を持ちながらも、それを正しく活かせていない状態を示します。自己欺瞞や操作的な行動に注意が必要です。内なる力を純粋な目的のために使うことを意識してください。" },
  "major_2":{ name:"女教皇", en:"The High Priestess", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/RWS_Tarot_02_High_Priestess.jpg/180px-RWS_Tarot_02_High_Priestess.jpg", keywords:["直感","神秘","内省","知恵","潜在意識"], upright:"表面には現れていない深いところに、重要な真実が隠されています。静かに内側に耳を傾け、直感のメッセージを受け取ってください。焦らず、答えが自然と浮かび上がるのを待つ余裕を持ちましょう。", reversed:"感情を抑圧していたり、自分の直感を無視しているサインです。他者の意見に振り回されず、自分の内なる声に従うことが今大切です。" },
  "major_3":{ name:"女帝", en:"The Empress", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/RWS_Tarot_03_Empress.jpg/180px-RWS_Tarot_03_Empress.jpg", keywords:["豊かさ","創造","母性","自然","繁栄"], upright:"豊かさと繁栄のエネルギーがあなたを包んでいます。創造的な力が今最も輝いており、新しいものを育み、育てるのに最良の時期です。感覚を大切にし、美しいものと触れ合うことで、さらなる恵みを引き寄せましょう。", reversed:"創造力の停滞や、依存関係への警告です。自分自身を大切にすることを忘れていませんか？内なる豊かさを見つめ直し、自立した力を取り戻しましょう。" },
  "major_4":{ name:"皇帝", en:"The Emperor", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/RWS_Tarot_04_Emperor.jpg/180px-RWS_Tarot_04_Emperor.jpg", keywords:["権威","安定","構造","責任","リーダーシップ"], upright:"確固とした基盤の上に立ち、秩序と安定をもたらす力があなたにあります。責任感を持って物事に取り組み、論理的な判断で周囲を導くことで、大きな成果を手にすることができるでしょう。", reversed:"権威主義的な態度や、支配への欲求が問題を生じさせています。柔軟さを取り戻し、他者の意見にも耳を傾けることで、真のリーダーシップが育まれます。" },
  "major_5":{ name:"法王", en:"The Hierophant", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/RWS_Tarot_05_Hierophant.jpg/180px-RWS_Tarot_05_Hierophant.jpg", keywords:["伝統","教え","信仰","制度","精神的指導"], upright:"確立された知識や伝統の中に、あなたへのメッセージがあります。師や先人の教えに従い、正しい道を着実に歩むことで、精神的な成長と安定が訪れます。", reversed:"伝統や規則への反発心、または盲目的な服従を示します。自分自身の価値観を見つめ直し、何が本当に大切なのかを問い直す時期です。" },
  "major_6":{ name:"恋人", en:"The Lovers", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/TheLovers.jpg/180px-TheLovers.jpg", keywords:["愛","選択","調和","価値観","絆"], upright:"大切な選択の時が訪れています。心の声に従い、自分にとって真に価値あるものを選ぶことが求められています。愛と調和のエネルギーが高まっており、人間関係においても深い絆が生まれる予感があります。", reversed:"価値観の対立や、優柔不断さが問題を複雑にしています。自分の本当の望みを明確にし、心から信じられる道を選ぶ勇気を持ちましょう。" },
  "major_7":{ name:"戦車", en:"The Chariot", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/RWS_Tarot_07_Chariot.jpg/180px-RWS_Tarot_07_Chariot.jpg", keywords:["意志","勝利","制御","前進","決断"], upright:"強い意志と自制心によって、困難を乗り越える力があなたに宿っています。対立するものを制御し、目標に向かって力強く前進することで、望む勝利を手にすることができます。", reversed:"衝動的な行動や、方向性の喪失を示します。力に任せて突き進む前に、本当に向かうべき先を見定めることが必要です。" },
  "major_8":{ name:"力", en:"Strength", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/RWS_Tarot_08_Strength.jpg/180px-RWS_Tarot_08_Strength.jpg", keywords:["強さ","勇気","忍耐","優しさ","内なる力"], upright:"真の強さとは、力で制するのではなく、愛と優しさで導くことにあります。困難な状況にあっても、内なる静けさを保ちながら、しなやかに乗り越えていく力があなたには備わっています。", reversed:"自信の喪失や、感情のコントロールの難しさを示します。弱さを認める勇気もまた、真の強さの一部です。焦らず、自分のペースで力を取り戻しましょう。" },
  "major_9":{ name:"隠者", en:"The Hermit", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/RWS_Tarot_09_Hermit.jpg/180px-RWS_Tarot_09_Hermit.jpg", keywords:["内省","孤独","智慧","探求","導き"], upright:"外の世界から距離を置き、自分の内側と深く向き合う時期です。孤独を恐れず、静かな省察の中に、あなたが求めてきた答えが見つかるでしょう。内なる光が、進むべき道を照らしてくれます。", reversed:"孤立や引きこもりへの警告です。内省も必要ですが、世界との繋がりを断ち切ることは健全ではありません。信頼できる人に心を開いてみてください。" },
  "major_10":{ name:"運命の輪", en:"Wheel of Fortune", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg/180px-RWS_Tarot_10_Wheel_of_Fortune.jpg", keywords:["運命","変化","サイクル","好機","転換点"], upright:"大きな変化の波が訪れています。人生の輪が回り、新たなサイクルへと移行する転換期です。変化を恐れず受け入れることで、豊かな新しい局面が開かれていきます。", reversed:"悪い流れに飲み込まれているように感じるかもしれません。しかし、輪は必ずまた回ります。変化に抗わず、流れに身を委ねることで、状況は好転していくでしょう。" },
  "major_11":{ name:"正義", en:"Justice", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/RWS_Tarot_11_Justice.jpg/180px-RWS_Tarot_11_Justice.jpg", keywords:["公正","真実","バランス","責任","法"], upright:"物事は公正に裁かれ、正しいバランスが取り戻されます。自分の行動と選択に責任を持ち、誠実に向き合うことで、公平な結果が訪れます。真実から目を背けず、正直に行動してください。", reversed:"不公正な状況や、不誠実さへの警告です。都合の悪い真実から逃げていませんか？今こそ自分の行動を振り返り、正しい道に戻る勇気が必要です。" },
  "major_12":{ name:"吊るされた男", en:"The Hanged Man", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/RWS_Tarot_12_Hanged_Man.jpg/180px-RWS_Tarot_12_Hanged_Man.jpg", keywords:["犠牲","待機","新視点","手放し","啓示"], upright:"今は動くよりも、立ち止まって待つことに意味があります。普段とは異なる視点で物事を眺めることで、これまで見えていなかった真実が姿を現します。手放すことで、より大きなものを得られるでしょう。", reversed:"犠牲を払っているにもかかわらず、前に進めない閉塞感を示します。何に縛られているかを見極め、不必要な犠牲を手放すことが解放への鍵となります。" },
  "major_13":{ name:"死神", en:"Death", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/RWS_Tarot_13_Death.jpg/180px-RWS_Tarot_13_Death.jpg", keywords:["変容","終焉","再生","手放し","新たな始まり"], upright:"一つの時代が終わり、新しいものが生まれようとしています。このカードが示す「死」は物理的なものではなく、古いものが終わり、再生への扉が開くことを意味します。変化を恐れず受け入れましょう。", reversed:"変化への抵抗や、終わりを認めることへの恐れを示します。しがみついているものを手放すことで、新たな命が芽吹くでしょう。" },
  "major_14":{ name:"節制", en:"Temperance", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/RWS_Tarot_14_Temperance.jpg/180px-RWS_Tarot_14_Temperance.jpg", keywords:["調和","バランス","忍耐","調整","中庸"], upright:"極端を避け、調和のとれた中道を歩むことが今求められています。異なるものを上手くブレンドし、バランスを保つことで、穏やかで持続可能な豊かさが訪れます。急がず、焦らず。", reversed:"過剰さや不均衡が問題を引き起こしています。極端な考え方や行動を見直し、もう一方の側面にも目を向けることで、自然なバランスが戻ってきます。" },
  "major_15":{ name:"悪魔", en:"The Devil", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/RWS_Tarot_15_Devil.jpg/180px-RWS_Tarot_15_Devil.jpg", keywords:["束縛","執着","物質主義","誘惑","影"], upright:"何かに縛られているように感じていませんか？その鎖は、実はあなた自身が外すことのできるものかもしれません。恐れや執着があなたを閉じ込めています。真実を直視する勇気を持ちましょう。", reversed:"束縛からの解放の始まりです。依存や執着に気づき、それを手放す意志が芽生えています。長いトンネルの出口が見えてきたサインです。" },
  "major_16":{ name:"塔", en:"The Tower", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/RWS_Tarot_16_Tower.jpg/180px-RWS_Tarot_16_Tower.jpg", keywords:["崩壊","衝撃","覚醒","解放","再構築"], upright:"突然の変化や崩壊は、偽りの基盤が壊れるサインです。痛みを伴うかもしれませんが、必要なものが取り除かれることで、より真実に基づいた強固な何かを建て直すことができます。", reversed:"激しい変化を避けようとしているかもしれませんが、変化を先延ばしにすることで問題はより大きくなります。今こそ現実と向き合うべき時です。" },
  "major_17":{ name:"星", en:"The Star", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/RWS_Tarot_17_Star.jpg/180px-RWS_Tarot_17_Star.jpg", keywords:["希望","癒し","インスピレーション","信頼","未来"], upright:"嵐の後に星が輝くように、希望の光があなたの前に差し込んでいます。傷ついた心が癒され、夢と可能性が再び広がります。自分を信じ、宇宙の流れに身を任せてみてください。", reversed:"希望を失いかけているか、自己不信に陥っているサインです。しかし星は常に空に輝いています。雲が晴れるのをただ待ちましょう。" },
  "major_18":{ name:"月", en:"The Moon", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/RWS_Tarot_18_Moon.jpg/180px-RWS_Tarot_18_Moon.jpg", keywords:["幻想","不安","潜在意識","変化","神秘"], upright:"物事がはっきりと見えない、不確かな時期を示しています。恐れや幻想が現実を歪めているかもしれません。直感を頼りにしつつ、闇の中を一歩一歩慎重に進みましょう。夜明けは必ず来ます。", reversed:"混乱が少しずつ晴れていく兆しです。今まで隠れていた真実が明らかになり、不安が和らいでいくでしょう。" },
  "major_19":{ name:"太陽", en:"The Sun", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/RWS_Tarot_19_Sun.jpg/180px-RWS_Tarot_19_Sun.jpg", keywords:["喜び","成功","活力","明晰","幸福"], upright:"明るく輝かしいエネルギーに満ちた時期です。物事は順調に進み、喜びと成功があなたを待っています。自信を持ち、その光を周囲にも分かち合いましょう。今がまさに輝く時です。", reversed:"喜びや成功が影に隠れているように感じるかもしれませんが、太陽は常に雲の上に輝いています。少し視野を広げることで、見えていない光が見えてくるでしょう。" },
  "major_20":{ name:"審判", en:"Judgement", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/RWS_Tarot_20_Judgement.jpg/180px-RWS_Tarot_20_Judgement.jpg", keywords:["覚醒","解放","評価","再生","使命"], upright:"大きな覚醒と変容のときが来ています。過去を手放し、魂の呼び声に従うことで、新たな自分が誕生します。自分自身を正直に評価し、より高い使命へと踏み出しましょう。", reversed:"自己批判や後悔が前進を妨げています。過去の選択を裁くよりも、そこから学び、前を向くことで真の解放が訪れます。" },
  "major_21":{ name:"世界", en:"The World", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/RWS_Tarot_21_World.jpg/180px-RWS_Tarot_21_World.jpg", keywords:["完成","達成","統合","成就","円環"], upright:"一つの大きなサイクルが完結します。努力が実を結び、真の意味での達成と充実感が訪れます。あなたはその旅を通じて大きく成長し、次のより豊かな旅へと準備が整っています。", reversed:"ゴールを目前にして停滞しているか、完成を急ぎすぎているサインです。最後の仕上げを丁寧に行うことで、真の成就が訪れます。" },
  "wands_ace":{ name:"ワンドのエース", en:"Ace of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Wands01.jpg/180px-Wands01.jpg", keywords:["創造の火花","新しいインスピレーション","熱意","潜在的エネルギー"], upright:"新しい情熱と創造力の芽生えを示しています。あなたの中に何か新しいプロジェクトや情熱の種が宿っています。このエネルギーを大切に育てることで、大きな成果へと発展します。", reversed:"アイデアはあるが行動に移せない状態です。エネルギーの無駄遣いや、方向性の定まらない情熱に注意してください。" },
  "wands_2":{ name:"ワンドの2", en:"Two of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Wands02.jpg/180px-Wands02.jpg", keywords:["計画","展望","冒険","新世界"], upright:"広大な可能性を前に、次のステップを計画している時期です。未知の世界への扉が開かれており、大きな展望を持って前進する力があります。", reversed:"決断を避けていたり、先延ばし癖が出ています。安全地帯に留まることで機会を逃しているかもしれません。" },
  "wands_3":{ name:"ワンドの3", en:"Three of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Wands03.jpg/180px-Wands03.jpg", keywords:["展開","前進","視野","貿易","旅"], upright:"努力が実り始め、より広い視野で物事を見渡せる位置に立っています。計画が形になり始め、次のフェーズへの準備が整っています。", reversed:"期待していた成果が遅れているか、計画に見直しが必要です。焦らず、戦略を再調整しましょう。" },
  "wands_4":{ name:"ワンドの4", en:"Four of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Wands04.jpg/180px-Wands04.jpg", keywords:["祝祭","コミュニティ","調和","家","安定"], upright:"達成を祝い、喜びを分かち合う時期です。安定した基盤の上で、人々と共に幸福を享受できます。帰るべき場所、安らぎの時間を大切にしましょう。", reversed:"家庭内の不調和や、祝福すべき何かを見落としているかもしれません。周囲の幸福に目を向けてみてください。" },
  "wands_5":{ name:"ワンドの5", en:"Five of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Wands05.jpg/180px-Wands05.jpg", keywords:["競争","葛藤","混乱","挑戦","多様性"], upright:"活発な競争や意見の衝突が起きています。これは成長の機会でもあります。異なる意見や視点をエネルギーに変え、建設的な方向へ向けましょう。", reversed:"不必要な争いを避け、内なる葛藤と向き合う時です。競争より協力を選ぶことで、よりよい結果が生まれます。" },
  "wands_6":{ name:"ワンドの6", en:"Six of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Wands06.jpg/180px-Wands06.jpg", keywords:["勝利","認知","自信","リーダーシップ","成功"], upright:"努力が認められ、勝利と成功が訪れます。周囲からの承認と賞賛があなたを待っています。自信を持ってその地位に立ちましょう。", reversed:"慢心や、承認欲求への執着に注意です。真の自信は他者の評価に左右されません。" },
  "wands_7":{ name:"ワンドの7", en:"Seven of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Wands07.jpg/180px-Wands07.jpg", keywords:["防衛","挑戦","立場","揺るぎなさ","信念"], upright:"多くの挑戦や反対意見に直面していますが、あなたには高い立場と優位性があります。信念を曲げず、自分の立場を毅然と守ることが大切です。", reversed:"プレッシャーに押されて自分を見失っています。妥協しすぎず、自分の価値を信じましょう。" },
  "wands_8":{ name:"ワンドの8", en:"Eight of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Wands08.jpg/180px-Wands08.jpg", keywords:["スピード","動き","メッセージ","機会","前進"], upright:"物事が一気に動き出し、速いスピードで進展します。ニュースや情報が飛び込んでくる時期。流れに乗り、素早い行動を心がけましょう。", reversed:"物事が停滞している、またはスピードが速すぎて混乱しています。ペースを調整し、方向性を確認してください。" },
  "wands_9":{ name:"ワンドの9", en:"Nine of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Wands09.jpg/180px-Wands09.jpg", keywords:["忍耐","回復力","試練","防衛","最後の踏ん張り"], upright:"長い戦いに疲れていても、もう少しで目標に到達します。傷を負いながらも立ち続けるあなたの強さを信じてください。最後の力を振り絞る時です。", reversed:"過度な警戒心や頑固さが前進を妨げています。防衛を少し緩め、サポートを受け入れることも大切です。" },
  "wands_10":{ name:"ワンドの10", en:"Ten of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Wands10.jpg/180px-Wands10.jpg", keywords:["重荷","過負荷","責任","完成","終章"], upright:"多くの責任を一人で背負っている状態です。目標はもうすぐそこ。しかし、すべてを一人でやり遂げようとせず、助けを求めることも知恵です。", reversed:"重荷を手放す時が来ています。不必要な責任を下ろし、休息を取ることで新たな力が湧いてきます。" },
  "wands_page":{ name:"ワンドのペイジ", en:"Page of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Wands11.jpg/180px-Wands11.jpg", keywords:["熱意","探求","自由なる魂","ニュース","新鮮さ"], upright:"新しいアイデアや情熱への好奇心が溢れています。冒険的な精神で、新しいことを恐れず試みることで、豊かな体験が待っています。", reversed:"衝動的な行動や一貫性のなさへの注意です。熱しやすく冷めやすい傾向に気をつけましょう。" },
  "wands_knight":{ name:"ワンドのナイト", en:"Knight of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Wands12.jpg/180px-Wands12.jpg", keywords:["冒険","衝動","カリスマ","行動力","旅"], upright:"情熱的なエネルギーで素早く行動する時です。目標に向かって果敢に突き進む力がありますが、無謀にならないよう注意も必要です。", reversed:"衝動的すぎて計画性が欠けています。行動する前に一呼吸置き、方向性を確認しましょう。" },
  "wands_queen":{ name:"ワンドのクイーン", en:"Queen of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Wands13.jpg/180px-Wands13.jpg", keywords:["独立","自信","外向性","情熱","リーダーシップ"], upright:"自信に満ち、情熱的なエネルギーが輝いています。人を引きつける魅力と力強さで、周囲に良いインスピレーションを与えることができます。", reversed:"嫉妬や支配的な態度への警告です。内なる不安から防衛的になっていませんか？" },
  "wands_king":{ name:"ワンドのキング", en:"King of Wands", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Wands14.jpg/180px-Wands14.jpg", keywords:["ビジョン","リーダーシップ","起業家精神","カリスマ","責任"], upright:"大きなビジョンを持ち、人々を導く力があります。責任感と情熱を持ってリーダーシップを発揮することで、大きな成果を生み出せます。", reversed:"傲慢さや、無謀なリーダーシップへの警告です。周囲の声に耳を傾けることも大切です。" },
  "cups_ace":{ name:"カップのエース", en:"Ace of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Cups01.jpg/180px-Cups01.jpg", keywords:["愛の始まり","直感","感情の豊かさ","創造性","精神性"], upright:"愛と感情の新しい扉が開かれます。心が満たされ、深い感情的な繋がりや創造的なインスピレーションが溢れ出す時期です。", reversed:"感情を抑圧しているか、愛を受け取ることへの恐れがあります。心の扉を開くことを恐れないでください。" },
  "cups_2":{ name:"カップの2", en:"Two of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Cups02.jpg/180px-Cups02.jpg", keywords:["パートナーシップ","調和","相互尊重","愛","繋がり"], upright:"深い繋がりと相互理解に満ちた関係が育まれています。愛と信頼の絆が深まり、二つの心が一つになる喜びがあります。", reversed:"関係のバランスが崩れているか、コミュニケーション不足が問題です。お互いの気持ちを素直に伝え合いましょう。" },
  "cups_3":{ name:"カップの3", en:"Three of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Cups03.jpg/180px-Cups03.jpg", keywords:["祝祭","友情","コミュニティ","喜び","お祝い"], upright:"喜びを分かち合える仲間との幸福な時間です。友人や仲間との繋がりを大切にし、一緒に成功を祝いましょう。", reversed:"パーティーや娯楽の過剰、または孤立を示します。楽しむことと責任のバランスを見直しましょう。" },
  "cups_4":{ name:"カップの4", en:"Four of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Cups04.jpg/180px-Cups04.jpg", keywords:["内省","不満","機会の見落とし","倦怠","再評価"], upright:"目の前の豊かさに気づかず、内側に閉じこもっているかもしれません。目を開き、差し出されている新たな可能性に目を向けてください。", reversed:"無気力からの脱却の時です。新しい視点で世界を見ることで、見えていなかった選択肢が現れます。" },
  "cups_5":{ name:"カップの5", en:"Five of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Cups05.jpg/180px-Cups05.jpg", keywords:["喪失","悲しみ","後悔","悲哀","前を向く"], upright:"喪失や後悔が心を支配していますが、まだ残っているものがあることを忘れないでください。悲しみと向き合いながらも、残されたものに希望を見出す時です。", reversed:"悲しみから立ち直り、前を向き始めています。過去は変えられませんが、未来は今この瞬間に作られます。" },
  "cups_6":{ name:"カップの6", en:"Six of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Cups06.jpg/180px-Cups06.jpg", keywords:["懐かしさ","幼い頃","純粋さ","贈り物","過去"], upright:"過去の幸せな思い出や、無邪気だった頃の自分を思い出させるカードです。純粋な気持ちで与えることの喜びを再発見できます。", reversed:"過去への固執が現在を見えなくしています。懐かしむことはよいですが、今ここにある喜びも大切にしましょう。" },
  "cups_7":{ name:"カップの7", en:"Seven of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Cups07.jpg/180px-Cups07.jpg", keywords:["幻想","願望","選択","夢","非現実"], upright:"多くの夢や可能性が目の前に広がっていますが、すべてが現実ではありません。幻想と現実を見極め、本当に望むものを選び取る洞察力が必要です。", reversed:"混乱から抜け出し、現実的な選択をする準備ができてきています。夢を持ちながら、地に足をつけた行動をとりましょう。" },
  "cups_8":{ name:"カップの8", en:"Eight of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Cups08.jpg/180px-Cups08.jpg", keywords:["撤退","探求","内なる旅","手放し","より深い意味"], upright:"築き上げてきたものを手放し、より深い意味を求めて旅立つ時です。物質的な成功より、魂の満足を優先する転換点に来ています。", reversed:"引き留めているものから離れられずにいます。本当は分かっているはずの答えから目を背けていませんか？" },
  "cups_9":{ name:"カップの9", en:"Nine of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Cups09.jpg/180px-Cups09.jpg", keywords:["満足","願望成就","幸福","豊かさ","喜び"], upright:"願いが叶い、深い満足感に包まれる時期です。感情的な豊かさと幸福が手に入り、人生の喜びを十分に味わえます。このカードは「願い事カード」とも呼ばれます。", reversed:"外見上の満足の裏に、空虚さが隠れているかもしれません。本当の幸福とは何かを見つめ直しましょう。" },
  "cups_10":{ name:"カップの10", en:"Ten of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Cups10.jpg/180px-Cups10.jpg", keywords:["家族の幸福","愛","調和","永続する喜び","感謝"], upright:"家族や愛する人々との深い幸福と調和を示しています。長期的な幸福が実現し、心から満たされた状態が続きます。", reversed:"家庭内の不調和や、表面的な幸福の裏の問題に目を向ける時です。" },
  "cups_page":{ name:"カップのペイジ", en:"Page of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Cups11.jpg/180px-Cups11.jpg", keywords:["感受性","夢想","メッセージ","直感","創造性"], upright:"感受性豊かな直感のメッセージが届いています。夢や芸術、直感的なインスピレーションに耳を傾ける時です。", reversed:"感情的な成熟度の欠如や、空想への逃避に注意しましょう。" },
  "cups_knight":{ name:"カップのナイト", en:"Knight of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Cups12.jpg/180px-Cups12.jpg", keywords:["ロマンス","理想主義","夢","誘い","感情"], upright:"ロマンチックな誘いや、理想を追い求めるエネルギーが高まっています。夢と現実のバランスを保ちながら、心の声に従いましょう。", reversed:"感情的な不安定さや、理想と現実のギャップへの対処が必要です。" },
  "cups_queen":{ name:"カップのクイーン", en:"Queen of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Cups13.jpg/180px-Cups13.jpg", keywords:["共感","直感","感情の知性","看護","思いやり"], upright:"深い共感力と直感で周囲を支える力があります。感情の知性を活かし、思いやりのある関係を育みましょう。", reversed:"感情に溺れるか、他者への共感で自分を失っています。自己ケアを忘れないでください。" },
  "cups_king":{ name:"カップのキング", en:"King of Cups", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Cups14.jpg/180px-Cups14.jpg", keywords:["感情的成熟","知恵","外交的","思いやり","バランス"], upright:"感情と理性を高度にバランスさせた成熟した人物像です。思いやりと知恵で人々を支え、感情的な混乱の中でも冷静さを保てます。", reversed:"感情の操作や、内なる感情の抑圧に注意が必要です。" },
  "swords_ace":{ name:"ソードのエース", en:"Ace of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Swords01.jpg/180px-Swords01.jpg", keywords:["真実","明晰さ","突破口","知性","新たな考え"], upright:"真実と明晰な思考の力が与えられています。鋭い知性で物事の本質を見抜き、混乱を切り開いてください。正しい判断が状況を打開します。", reversed:"混乱した思考や、コミュニケーションの問題があります。明確に考え、正直に伝えることを心がけましょう。" },
  "swords_2":{ name:"ソードの2", en:"Two of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Swords02.jpg/180px-Swords02.jpg", keywords:["行き詰まり","選択","均衡","否定","決断の回避"], upright:"難しい選択の前で立ち止まっています。目を閉じて現実から逃げても問題は解決しません。真実と向き合い、決断する勇気を持ちましょう。", reversed:"情報が明らかになり、決断するための準備が整ってきています。" },
  "swords_3":{ name:"ソードの3", en:"Three of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Swords03.jpg/180px-Swords03.jpg", keywords:["悲しみ","痛み","喪失","孤独","裏切り"], upright:"心の痛みや悲しみと真正面から向き合っています。辛い感情を感じることも、癒しへの一歩です。この痛みは永遠には続きません。", reversed:"悲しみが癒え始めています。傷を認め、手放すことで本当の回復が始まります。" },
  "swords_4":{ name:"ソードの4", en:"Four of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Swords04.jpg/180px-Swords04.jpg", keywords:["休息","回復","静寂","内省","再充電"], upright:"休息と回復の時間が必要です。戦場から離れ、静かな場所で英気を養うことが、次の行動への準備となります。", reversed:"休息から目覚め、再び動き出す準備ができています。" },
  "swords_5":{ name:"ソードの5", en:"Five of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Swords05.jpg/180px-Swords05.jpg", keywords:["葛藤","不正","敗北","勝利の代償","退却"], upright:"勝っても負けても傷が残る争いがあります。いつ引くべきかを知ることも知恵です。全力で戦う価値があるかを見極めましょう。", reversed:"争いから解放されつつあります。和解や手放しで、より良い結果が生まれます。" },
  "swords_6":{ name:"ソードの6", en:"Six of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Swords06.jpg/180px-Swords06.jpg", keywords:["移行","回復","旅","より穏やかな水","逃避"], upright:"困難な状況から抜け出し、より穏やかな場所へと移行しています。まだ傷は残っていますが、嵐は過ぎ去りつつあります。", reversed:"前に進みたいのに、何かに引き戻されています。何を手放すべきかを考えてみてください。" },
  "swords_7":{ name:"ソードの7", en:"Seven of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Swords07.jpg/180px-Swords07.jpg", keywords:["欺瞞","戦略","孤独な行動","回避","不誠実"], upright:"戦略的な行動が必要な場面ですが、正直さの範囲内で行動することが大切です。誰かに騙されていないか、または自分が不誠実になっていないかを確認しましょう。", reversed:"隠していたことが明らかになる時です。正直に向き合うことで問題を解決できます。" },
  "swords_8":{ name:"ソードの8", en:"Eight of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Swords08.jpg/180px-Swords08.jpg", keywords:["拘束","無力感","自己制限","恐れ","孤立"], upright:"縛られているように感じていますが、多くは自己制限から来ています。目隠しを外し、周りを見渡すことで、逃げ道は思ったより近くにあることに気づくでしょう。", reversed:"自己解放の時が来ています。恐れを超えて一歩踏み出すことで、自由が手に入ります。" },
  "swords_9":{ name:"ソードの9", en:"Nine of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Swords09.jpg/180px-Swords09.jpg", keywords:["不安","悪夢","罪悪感","心配","精神的苦痛"], upright:"心の中の不安や恐れが夜も眠れないほど大きくなっています。しかし、多くの心配事は思い込みです。現実を冷静に見つめることで、恐れが小さくなっていくでしょう。", reversed:"最悪の状況は過ぎ去りつつあります。深呼吸をして、新しい日の光を受け入れましょう。" },
  "swords_10":{ name:"ソードの10", en:"Ten of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Swords10.jpg/180px-Swords10.jpg", keywords:["終焉","敗北","裏切り","痛み","サイクルの完結"], upright:"非常に困難な終わりを示していますが、夜明け前が最も暗い時です。このサイクルが完全に終わることで、新しい始まりへの扉が開かれます。", reversed:"最悪の時期を乗り越え、回復が始まっています。" },
  "swords_page":{ name:"ソードのペイジ", en:"Page of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Swords11.jpg/180px-Swords11.jpg", keywords:["好奇心","鋭い観察","新しいアイデア","コミュニケーション","機敏さ"], upright:"鋭い知性と好奇心で、新しいアイデアや情報を探求する時期です。素早い思考で問題を分析し、真実を見抜く力があります。", reversed:"噂や軽率な言葉への注意が必要です。思慮深く言葉を選びましょう。" },
  "swords_knight":{ name:"ソードのナイト", en:"Knight of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Swords12.jpg/180px-Swords12.jpg", keywords:["野心","行動力","直接性","大胆","衝動"], upright:"素早い決断と大胆な行動で障害を突き破る力があります。ただし、周囲への影響を考慮することも忘れないでください。", reversed:"無謀さや攻撃性への警告です。スピードを落とし、思慮ある行動を。" },
  "swords_queen":{ name:"ソードのクイーン", en:"Queen of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Swords13.jpg/180px-Swords13.jpg", keywords:["独立","明晰な思考","誠実さ","直接性","知恵"], upright:"経験から生まれた知恵と鋭い判断力を持っています。感情に流されず、明確に物事を見通し、正直に伝える力があります。", reversed:"冷淡さや批判的すぎる態度への注意。心の傷から来る防衛的な姿勢を見直しましょう。" },
  "swords_king":{ name:"ソードのキング", en:"King of Swords", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Swords14.jpg/180px-Swords14.jpg", keywords:["権威","知性","倫理","公正","明晰な判断"], upright:"高い知性と公正な判断力で、複雑な状況を明確に分析できます。倫理と論理に基づいた権威あるリーダーシップを発揮できます。", reversed:"独裁的な態度や、冷酷な判断への警告です。" },
  "pentacles_ace":{ name:"ペンタクルのエース", en:"Ace of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Pents01.jpg/180px-Pents01.jpg", keywords:["新しい機会","豊かさ","物質的な始まり","安定","繁栄"], upright:"物質的な豊かさと新しい機会の扉が開かれています。財政的な安定や新しいビジネスの種が宿っています。この機会を大切に育てましょう。", reversed:"機会を逃しているか、物質的な安定への執着が問題です。" },
  "pentacles_2":{ name:"ペンタクルの2", en:"Two of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Pents02.jpg/180px-Pents02.jpg", keywords:["バランス","適応","マルチタスク","優先順位","柔軟性"], upright:"複数のことを同時にこなしながら、バランスを保っています。状況の変化に柔軟に対応する能力が必要です。", reversed:"手を広げすぎて、どこにも集中できていません。優先順位を整理しましょう。" },
  "pentacles_3":{ name:"ペンタクルの3", en:"Three of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Pents03.jpg/180px-Pents03.jpg", keywords:["チームワーク","スキル","協力","学習","達人への道"], upright:"チームでの協力と専門的なスキルの発揮が成功の鍵です。他者の知識から学び、共に優れた仕事を作り上げましょう。", reversed:"チームワークの問題や、質よりも量を優先してしまっています。" },
  "pentacles_4":{ name:"ペンタクルの4", en:"Four of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Pents04.jpg/180px-Pents04.jpg", keywords:["安定","保存","所有","セキュリティ","蓄積"], upright:"財的安定を守ろうとする気持ちは自然ですが、過度な執着は成長を妨げます。今持っているものを大切にしながら、変化も受け入れることが重要です。", reversed:"物への執着を手放すことで、より豊かな流れが戻ってきます。" },
  "pentacles_5":{ name:"ペンタクルの5", en:"Five of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Pents05.jpg/180px-Pents05.jpg", keywords:["貧困","喪失","孤立","困難","助けを求めること"], upright:"経済的、精神的な困難の時期ですが、助けは近くにあります。孤立せず、サポートを求める勇気を持ちましょう。試練は必ず終わります。", reversed:"困難から立ち直りつつあります。経済的または感情的な回復の兆しが見えてきています。" },
  "pentacles_6":{ name:"ペンタクルの6", en:"Six of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Pents06.jpg/180px-Pents06.jpg", keywords:["寛大さ","共有","与える","受け取る","豊かさのバランス"], upright:"与えることと受け取ることのバランスが大切です。豊かさを惜しみなく分かち合うことで、さらなる豊かさが循環して戻ってきます。", reversed:"一方的な与え方か受け取り方になっています。バランスを見直しましょう。" },
  "pentacles_7":{ name:"ペンタクルの7", en:"Seven of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Pents07.jpg/180px-Pents07.jpg", keywords:["忍耐","長期的投資","評価","成長","収穫前"], upright:"努力の成果が実を結ぶまで、もう少し時間が必要です。今は中間点で評価と見直しをする時期。長期的な視点で取り組み続けましょう。", reversed:"焦りや、努力が報われないフラストレーションがあります。何に投資すべきかを見直す時です。" },
  "pentacles_8":{ name:"ペンタクルの8", en:"Eight of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Pents08.jpg/180px-Pents08.jpg", keywords:["職人精神","技術向上","勤勉","習得","専門性"], upright:"技術と専門性を磨く時期です。コツコツと努力を重ねることで、真の熟達に近づきます。今の仕事に誠実に向き合いましょう。", reversed:"質を疎かにした量産や、完璧主義のあまり進めないでいます。" },
  "pentacles_9":{ name:"ペンタクルの9", en:"Nine of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Pents09.jpg/180px-Pents09.jpg", keywords:["豊かさ","独立","自給自足","洗練","達成"], upright:"自分の努力で築いた豊かさと独立を享受する時期です。物質的にも精神的にも充実しており、その成果を誇りに思ってよいでしょう。", reversed:"物質的豊かさの裏に、孤独や不満を感じていませんか？" },
  "pentacles_10":{ name:"ペンタクルの10", en:"Ten of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Pents10.jpg/180px-Pents10.jpg", keywords:["世代を超えた豊かさ","家族","遺産","安定","繁栄"], upright:"長年の努力が実り、家族全体の安定と繁栄が確立されます。世代を超えた豊かさと、確かな基盤が築かれています。", reversed:"家族の問題や財産争いへの注意。本当に大切なものを見つめ直しましょう。" },
  "pentacles_page":{ name:"ペンタクルのペイジ", en:"Page of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Pents11.jpg/180px-Pents11.jpg", keywords:["学習","新しいスキル","実践的","機会","向上心"], upright:"新しいスキルや知識を貪欲に学ぶ時期です。実践的な向上心が豊かな未来への基盤を作ります。", reversed:"計画倒れや、学習への取り組みの甘さに注意が必要です。" },
  "pentacles_knight":{ name:"ペンタクルのナイト", en:"Knight of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Pents12.jpg/180px-Pents12.jpg", keywords:["勤勉","信頼性","忍耐","責任","完璧主義"], upright:"着実で信頼できる方法で目標に向かって進んでいます。コツコツとした努力が確かな結果をもたらします。", reversed:"退屈さや、頑固なまでの完璧主義が停滞を招いています。" },
  "pentacles_queen":{ name:"ペンタクルのクイーン", en:"Queen of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Pents13.jpg/180px-Pents13.jpg", keywords:["実践的","看護","豊かさ","安心感","現実的な知恵"], upright:"実践的な知恵と温かい思いやりで、家庭や仕事に豊かさをもたらす力があります。大地に根差した安定感と、美しいものを育てる才能があります。", reversed:"物質的なことへの過度な執着や、過保護への注意です。" },
  "pentacles_king":{ name:"ペンタクルのキング", en:"King of Pentacles", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pents14.jpg/180px-Pents14.jpg", keywords:["豊かさ","ビジネスの成功","現実的","信頼性","安定"], upright:"実践的なビジョンと信頼性で、物質的な成功と安定を築き上げています。長期的な視点で責任を持って取り組むことで、揺るぎない豊かさが手に入ります。", reversed:"物質主義への警告、または財政的な問題への注意が必要です。" }
};

const MAJOR_KEYS = Object.keys(TAROT_DATA).filter(k => k.startsWith('major_'));
const ALL_KEYS   = Object.keys(TAROT_DATA);

const SPREAD_POSITIONS = {
  1:  ["現在の状況"],
  3:  ["過去","現在","未来"],
  5:  ["現在","課題","潜在意識","アドバイス","結果"],
  10: ["現在の状況","障害または助け","遠い過去の基盤","近い過去","可能な結果","近い未来","あなた自身","外部環境","希望と恐れ","最終結果"]
};

const THEME_INFO = {
  general: { label:"直近の運勢",   prompt:"直近の運勢全般（近い将来に起こりうること・注意すべき点・チャンスなど）" },
  money:   { label:"金運",         prompt:"金運・財運（収入・支出・投資・財的チャンスや注意点など）" },
  overall: { label:"総合運",       prompt:"総合的な運勢（人生全般のバランス・エネルギーの流れ・今後の方向性など）" },
  work:    { label:"仕事運",       prompt:"仕事・キャリア運（職場の環境・プロジェクト・転職・スキルアップなど）" },
  relation:{ label:"対人関係",     prompt:"人間関係・対人運（恋愛・友情・家族・職場の人間関係など）" },
  free:    { label:"心に浮かべたこと", prompt:"心の中で強く思い浮かべたこと・テーマ" }
};

// 状態
let selectedCount = 1;
let selectedTheme = 'general';
let reversedEnabled = false;
let minorEnabled = false;
let drawnCards = [];

// 星生成
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*4+2}s;--delay:${Math.random()*5}s;--brightness:${Math.random()*.5+.3};`;
    c.appendChild(s);
  }
})();

// 枚数ボタン
document.querySelectorAll('.opt-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedCount = parseInt(btn.dataset.count);
  });
});

// テーマボタン
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedTheme = btn.dataset.theme;
  });
});

// トグル
document.getElementById('reversed-toggle').addEventListener('change',e=>{ reversedEnabled=e.target.checked; });
document.getElementById('minor-toggle').addEventListener('change',e=>{ minorEnabled=e.target.checked; });

// カードを引く
function drawCards(count){
  const pool = minorEnabled ? ALL_KEYS : MAJOR_KEYS;
  const shuffled = [...pool].sort(()=>Math.random()-.5);
  return shuffled.slice(0,count).map(key=>({
    key, data:TAROT_DATA[key],
    reversed: reversedEnabled ? Math.random()<.5 : false
  }));
}

// カード表示
function renderCards(cards){
  const grid = document.getElementById('cards-grid');
  const positions = SPREAD_POSITIONS[cards.length] || cards.map((_,i)=>`カード ${i+1}`);
  grid.innerHTML='';
  cards.forEach((card,i)=>{
    const wrapper = document.createElement('div');
    wrapper.className='card-wrapper';
    const frame = document.createElement('div');
    frame.className='card-frame'+(card.reversed?' reversed':'');
    const img = document.createElement('img');
    img.alt=card.data.name;
    img.referrerPolicy='no-referrer';
    img.crossOrigin='anonymous';
    img.loading='lazy';
    img.src=card.data.img;
    img.onerror=function(){
      this.onerror=null; this.style.display='none';
      frame.style.background='linear-gradient(135deg,#1a0f2e,#2a1f3d)';
      const fb=document.createElement('div');
      fb.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center;';
      fb.innerHTML=`<div style="font-size:2rem;color:#c9a84c;margin-bottom:8px">✦</div><div style="color:#c9a84c;font-size:.8rem;font-family:Cormorant Garamond,serif;line-height:1.4">${card.data.name}</div><div style="color:#6e5a2a;font-size:.65rem;margin-top:4px;font-style:italic">${card.data.en}</div>`;
      frame.appendChild(fb);
    };
    const badge=document.createElement('div');
    badge.className='card-badge';
    badge.textContent=card.reversed?'逆':'正';
    frame.appendChild(img); frame.appendChild(badge);
    const nm=document.createElement('div'); nm.className='card-name'; nm.textContent=card.data.name;
    const pl=document.createElement('div'); pl.className='card-pos-label'; pl.textContent=positions[i];
    wrapper.appendChild(frame); wrapper.appendChild(nm); wrapper.appendChild(pl);
    wrapper.addEventListener('click',()=>selectCard(i,wrapper));
    grid.appendChild(wrapper);
    setTimeout(()=>wrapper.classList.add('visible'),i*150+100);
  });
}

// 個別解説
function selectCard(index,wrapper){
  document.querySelectorAll('.card-wrapper').forEach(w=>w.classList.remove('selected'));
  wrapper.classList.add('selected');
  const card=drawnCards[index];
  const positions=SPREAD_POSITIONS[drawnCards.length]||drawnCards.map((_,i)=>`カード ${i+1}`);
  const orientationText=card.reversed?'逆位置':'正位置';
  const meaning=card.reversed?card.data.reversed:card.data.upright;
  const keywords=card.reversed?card.data.keywords.map(k=>k+'（逆）').slice(0,3):card.data.keywords;
  const panel=document.getElementById('reading-panel');
  panel.innerHTML=`
    <div class="reading-card-title">${card.data.name}（${card.data.en}）</div>
    <div class="reading-position">${positions[index]} ｜ ${orientationText}</div>
    <hr class="divider">
    <div class="reading-section-title">✦ キーワード</div>
    <div style="margin-bottom:18px">${keywords.map(k=>`<span class="reading-keyword">${k}</span>`).join('')}</div>
    <hr class="divider">
    <div class="reading-section-title">✦ 解説</div>
    <p class="reading-text">${meaning}</p>
  `;
  const ra=document.getElementById('reading-area');
  ra.style.display='block';
  ra.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// AI総合解説を取得
async function fetchAIReading(cards, theme){
  const positions = SPREAD_POSITIONS[cards.length] || cards.map((_,i)=>`カード ${i+1}`);
  const themeInfo = THEME_INFO[theme];
  const cardDescriptions = cards.map((card,i)=>{
    const pos = positions[i];
    const orient = card.reversed ? '逆位置' : '正位置';
    const meaning = card.reversed ? card.data.reversed : card.data.upright;
    return `【${pos}】${card.data.name}（${card.data.en}）- ${orient}\nキーワード：${card.data.keywords.join('、')}\n意味：${meaning}`;
  }).join('\n\n');

  const spreadName = {1:'一枚引き',3:'過去・現在・未来の3枚スプレッド',5:'ファイブカードスプレッド',10:'ケルト十字スプレッド'}[cards.length] || `${cards.length}枚スプレッド`;

  const prompt = `あなたはプロのタロットリーダーです。以下のタロットカードのリーディングを日本語で行ってください。

【占うテーマ】${themeInfo.prompt}
【スプレッド】${spreadName}

【引いたカード】
${cardDescriptions}

上記のカードを総合的に読み解き、「${themeInfo.label}」についての統合されたメッセージを300〜500文字程度で伝えてください。
各カードの位置の意味を踏まえながら、カード同士の関係性やストーリーを読み解いてください。
最後に、具体的なアドバイスや心がけをひとつ添えてください。
タロットらしい神秘的かつ温かみのある文体で、断定的すぎず、でも示唆に富んだ内容にしてください。`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role:'user', content: prompt }]
    })
  });
  const data = await response.json();
  if(data.content && data.content[0] && data.content[0].text){
    return data.content[0].text;
  }
  throw new Error('API response error');
}

// ドローボタン
document.getElementById('draw-btn').addEventListener('click', async ()=>{
  const drawBtn=document.getElementById('draw-btn');
  const loading=document.getElementById('loading');
  const cardsArea=document.getElementById('cards-area');
  const aiArea=document.getElementById('ai-reading-area');
  const readingArea=document.getElementById('reading-area');
  const resetBtn=document.getElementById('reset-btn');
  const aiContent=document.getElementById('ai-content');
  const aiTitle=document.getElementById('ai-title');
  const aiSubtitle=document.getElementById('ai-subtitle');

  drawBtn.disabled=true;
  loading.style.display='block';
  cardsArea.style.display='none';
  readingArea.style.display='none';

  await new Promise(r=>setTimeout(r,700));
  drawnCards = drawCards(selectedCount);
  loading.style.display='none';
  cardsArea.style.display='block';
  resetBtn.style.display='block';
  renderCards(drawnCards);

  // テーマ表示更新
  const themeInfo = THEME_INFO[selectedTheme];
  aiTitle.textContent = `${themeInfo.label}の総合リーディング`;
  aiSubtitle.textContent = `${drawnCards.length}枚のカードが語るメッセージ`;

  // AI解説エリア表示（ローディング状態）
  aiArea.style.display='block';
  aiContent.innerHTML=`
    <div class="ai-loading">
      <div class="ai-loading-dots"><span></span><span></span><span></span></div>
      <p>星の声を読み解いています…</p>
    </div>`;
  aiArea.scrollIntoView({behavior:'smooth',block:'nearest'});

  // AI呼び出し
  try {
    const text = await fetchAIReading(drawnCards, selectedTheme);
    aiContent.innerHTML=`<p class="ai-text">${text}</p>`;
  } catch(e) {
    aiContent.innerHTML=`<p class="ai-text" style="color:var(--text-dim);font-style:italic;">
      ※ 総合リーディングを取得できませんでした。<br>カードをクリックして個別解説をご覧ください。
    </p>`;
  }
});

// リセット
document.getElementById('reset-btn').addEventListener('click',()=>{
  document.getElementById('draw-btn').disabled=false;
  document.getElementById('cards-area').style.display='none';
  document.getElementById('reading-area').style.display='none';
  document.getElementById('ai-reading-area').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  drawnCards=[];
  window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
</html>
